<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LIFACT Manager">
<meta name="theme-color" content="#111111">
<title>LIFACT Manager Ver.3</title>
<style>
:root{--bg:#0d0d0f;--card:#1b1b20;--panel:#25252b;--text:#fff;--muted:#aaa;--accent:#ff7a00;--line:#3b3b42;--danger:#ff4d4d;--ok:#27d17f;--warn:#ffd24a;--pitch:#153f25}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;padding-bottom:28px}
header{position:sticky;top:0;z-index:10;background:#000;border-bottom:1px solid #333;padding:14px;display:flex;justify-content:space-between;align-items:center}
.brand{color:var(--accent);font-weight:900;letter-spacing:.08em;font-size:13px}h1{font-size:18px;margin:2px 0 0}h2{font-size:17px;margin:0 0 12px}
main{max-width:820px;margin:auto;padding:12px}.card{background:var(--card);border:1px solid #333;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
button{border:0;border-radius:13px;padding:12px 14px;background:#333;color:white;font-weight:900;font-size:15px}.primary{background:var(--accent);color:#111}.ghost{background:#222;border:1px solid #444;color:#ddd}.danger{background:var(--danger)}.wide{width:100%}
input,textarea{width:100%;background:#0f0f10;color:#fff;border:1px solid #444;border-radius:12px;padding:12px;font-size:16px}
.timer{font-size:52px;color:var(--accent);font-weight:900;line-height:1}.sub,.hint{color:var(--muted);font-size:13px}.topBtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.status{display:flex;justify-content:space-between;gap:8px;color:#aaa;font-size:13px;margin-bottom:10px;flex-wrap:wrap}.pill{background:#111;border:1px solid #444;border-radius:999px;padding:7px 10px}
.pitch{position:relative;background:linear-gradient(180deg,#174d2b,#11351f);border:2px solid rgba(255,255,255,.35);border-radius:18px;height:420px;overflow:hidden;margin-top:8px}
.pitch:before{content:"";position:absolute;left:8%;right:8%;top:50%;border-top:2px solid rgba(255,255,255,.28)}
.pitch:after{content:"";position:absolute;left:50%;top:50%;width:88px;height:88px;border:2px solid rgba(255,255,255,.25);border-radius:50%;transform:translate(-50%,-50%)}
.slot{position:absolute;transform:translate(-50%,-50%);width:92px;min-height:54px;background:#111;border:2px solid var(--accent);border-radius:16px;display:grid;place-items:center;text-align:center;padding:7px;box-shadow:0 4px 12px rgba(0,0,0,.35)}
.slot .small{font-size:11px;color:#aaa}.slot b{font-size:14px}.slot .m{color:var(--accent);font-weight:900;font-size:13px}
.tapGuide{background:#111;border:1px solid #444;border-radius:14px;padding:12px;margin-bottom:10px;color:#ddd}.tapGuide b{color:var(--accent)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.list{display:grid;gap:8px}
.player{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px;display:grid;grid-template-columns:42px 1fr 62px;gap:8px;align-items:center;cursor:pointer}
.player.selected{border-color:#fff;background:#3b2a18}.player.on{border-color:var(--accent);background:#2b2118}.badge{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:#111;border:1px solid #444;color:var(--accent);font-weight:900}.name{font-weight:900}.mins{text-align:right;font-weight:900;font-size:18px}
.low .mins{color:var(--danger)}.mid .mins{color:var(--warn)}.good .mins{color:var(--ok)}
.nameRow{display:grid;grid-template-columns:42px 1fr;gap:8px;align-items:center;margin:7px 0}.num{background:var(--panel);border-radius:12px;text-align:center;padding:12px 0;color:var(--accent);font-weight:900}
.rec{display:flex;justify-content:space-between;background:var(--panel);padding:12px;border-radius:12px;margin:7px 0}.log{max-height:160px;overflow:auto;background:#111;border:1px solid #333;border-radius:12px;padding:10px;color:#ddd;font-size:13px;line-height:1.5}
.rowBtns{display:flex;gap:8px;margin-bottom:10px}textarea{height:190px;font-size:13px;line-height:1.45}footer{text-align:center;color:#777;font-size:12px;padding:14px}
@media(max-width:560px){.grid{grid-template-columns:1fr}.timer{font-size:46px}.topBtns{grid-template-columns:1fr 1fr}.pitch{height:390px}.slot{width:82px}.player{grid-template-columns:40px 1fr 58px}}
</style>
</head>
<body>
<header><div><div class="brand">LIFACT MANAGER Ver.3</div><h1>2タップ交代＋フォーメーション</h1></div><button id="resetAll" class="ghost">初期化</button></header>
<main>
<section class="card">
  <h2>試合タイマー</h2>
  <div class="timer" id="timer">20:00</div>
  <div class="sub"><span id="halfLabel">前半</span> / 8人制 / 20分ハーフ</div>
  <div class="topBtns">
    <button id="start" class="primary">開始</button>
    <button id="pause">停止</button>
    <button id="switchHalf">後半へ</button>
    <button id="resetHalf" class="ghost">20:00戻す</button>
  </div>
</section>

<section class="card">
  <h2>2タップ交代</h2>
  <div class="tapGuide" id="tapGuide">① <b>出場中</b>からOUT選手をタップ → ② <b>ベンチ</b>からIN選手をタップで交代完了</div>
  <div class="status">
    <span id="onCount" class="pill">出場中 0人</span>
    <span id="selected" class="pill">OUT未選択</span>
    <span id="fair" class="pill">公平度 -</span>
  </div>
</section>

<section class="card">
  <h2>フォーメーション表示</h2>
  <div class="pitch" id="pitch"></div>
</section>

<section class="card">
  <div class="grid">
    <div>
      <h2>🟢 出場中</h2>
      <div id="onList" class="list"></div>
    </div>
    <div>
      <h2>🔴 ベンチ</h2>
      <div id="benchList" class="list"></div>
    </div>
  </div>
</section>

<section class="card">
  <h2>交代おすすめ</h2>
  <div id="recommend"></div>
</section>

<section class="card">
  <h2>選手登録</h2>
  <p class="hint">名前を変更して保存。最初は「1〜8を出場中」を押すと簡単です。</p>
  <div id="edit"></div>
  <div class="topBtns">
    <button id="saveNames" class="primary">名前保存</button>
    <button id="setFirst8">1〜8を出場中</button>
    <button id="clearOn" class="ghost">全員ベンチ</button>
  </div>
</section>

<section class="card">
  <h2>交代履歴</h2>
  <div id="log" class="log">まだ履歴はありません。</div>
</section>

<section class="card">
  <h2>試合結果</h2>
  <div class="rowBtns"><button id="copy">結果コピー</button><button id="csv">CSV保存</button></div>
  <textarea id="result" readonly></textarea>
</section>
</main>
<footer>Safariで開いて「ホーム画面に追加」するとアプリ風に使えます。</footer>

<script>
const N=16, HALF=1200;
let s={names:Array.from({length:N},(_,i)=>"選手"+(i+1)),sec:Array(N).fill(0),on:Array(N).fill(false),rem:HALF,run:false,last:0,half:"前半",logs:[]};
let selectedOut=null;
const $=id=>document.getElementById(id);
const pos=[["GK",50,90],["DF",25,68],["DF",50,70],["DF",75,68],["MF",25,43],["MF",50,42],["MF",75,43],["FW",50,18]];
function load(){try{let v=localStorage.getItem("lifact_manager_v3");if(v)s={...s,...JSON.parse(v)}}catch(e){}}
function save(){localStorage.setItem("lifact_manager_v3",JSON.stringify(s))}
function fmt(x){x=Math.max(0,Math.round(x));return Math.floor(x/60)+":"+String(x%60).padStart(2,"0")}
function mins(x){return Math.round(x/60)}
function card(i,on){let m=mins(s.sec[i]),c=m<16?"low":m<20?"mid":"good";return `<div class="player ${on?'on':''} ${selectedOut===i?'selected':''} ${c}" data-player="${i}" data-on="${on?1:0}"><div class="badge">${i+1}</div><div class="name">${s.names[i]}</div><div class="mins">${m}分</div></div>`}
function edit(){let h="";s.names.forEach((n,i)=>h+=`<div class="nameRow"><div class="num">${i+1}</div><input data-name="${i}" value="${n}"></div>`);$("edit").innerHTML=h}
function renderPitch(onIdx){
 let h="";
 onIdx.slice(0,8).forEach((i,k)=>{let p=pos[k];h+=`<div class="slot" style="left:${p[1]}%;top:${p[2]}%"><div class="small">${p[0]} #${i+1}</div><b>${s.names[i]}</b><div class="m">${mins(s.sec[i])}分</div></div>`});
 $("pitch").innerHTML=h || "<div style='padding:16px;color:#ccc'>出場中の選手がいません。</div>";
}
function render(){
 $("timer").textContent=fmt(s.rem);$("halfLabel").textContent=s.half;
 let all=s.names.map((_,i)=>i), onIdx=all.filter(i=>s.on[i]), benchIdx=all.filter(i=>!s.on[i]);
 $("onCount").textContent="出場中 "+onIdx.length+"人"+(onIdx.length!==8?" ⚠️":"");
 $("selected").textContent=selectedOut===null?"OUT未選択":"OUT選択："+s.names[selectedOut];
 $("onList").innerHTML=onIdx.length?onIdx.map(i=>card(i,true)).join(""):"<p class='hint'>まだ出場中の選手がいません。</p>";
 $("benchList").innerHTML=benchIdx.length?benchIdx.map(i=>card(i,false)).join(""):"<p class='hint'>ベンチはいません。</p>";
 renderPitch(onIdx);
 document.querySelectorAll("[data-player]").forEach(el=>el.onclick=()=>tapPlayer(+el.dataset.player,el.dataset.on==="1"));
 let rec=benchIdx.map(i=>({i,sec:s.sec[i]})).sort((a,b)=>a.sec-b.sec).slice(0,5);
 $("recommend").innerHTML=rec.length?rec.map((p,k)=>`<div class="rec"><b>${k+1}. ${s.names[p.i]}</b><span>${mins(p.sec)}分</span></div>`).join(""):"<p class='hint'>ベンチ選手がいません。</p>";
 let avg=s.sec.reduce((a,b)=>a+b,0)/N,diff=s.sec.reduce((a,b)=>a+Math.abs(b-avg),0)/N,score=s.sec.some(x=>x>0)?Math.max(0,Math.round(100-diff/60*5)):"-";
 $("fair").textContent="公平度 "+score+(score==="-"?"":"%");
 $("log").innerHTML=s.logs.length?s.logs.slice().reverse().map(x=>`<div>${x}</div>`).join(""):"まだ履歴はありません。";
 $("result").value=`LIFACT 出場時間 Ver.3\\n${s.half} / 残り ${fmt(s.rem)}\\n平均：${(avg/60).toFixed(1)}分\\n\\n`+s.names.map((n,i)=>String(i+1).padStart(2,"0")+" "+n+"："+mins(s.sec[i])+"分").join("\\n");
 save();
}
function tapPlayer(i,isOn){
 if(isOn){selectedOut=i;render();return}
 if(selectedOut===null){alert("先に出場中からOUT選手をタップしてください");return}
 s.on[selectedOut]=false;s.on[i]=true;
 let t=s.half+" "+fmt(HALF-s.rem);
 s.logs.push(`${t}　OUT ${s.names[selectedOut]} → IN ${s.names[i]}`);
 selectedOut=null;render();
}
function tick(){if(!s.run)return;let now=Date.now(),e=Math.floor((now-s.last)/1000);if(e>0){s.last=now;s.rem=Math.max(0,s.rem-e);s.on.forEach((v,i)=>{if(v)s.sec[i]+=e});if(s.rem<=0)s.run=false;render()}requestAnimationFrame(tick)}
load();edit();render();
$("start").onclick=()=>{s.run=true;s.last=Date.now();render();tick()}
$("pause").onclick=()=>{s.run=false;render()}
$("resetHalf").onclick=()=>{s.run=false;s.rem=HALF;render()}
$("switchHalf").onclick=()=>{s.run=false;s.rem=HALF;s.half=s.half==="前半"?"後半":"前半";$("switchHalf").textContent=s.half==="前半"?"後半へ":"前半へ";render()}
$("saveNames").onclick=()=>{document.querySelectorAll("[data-name]").forEach(e=>s.names[+e.dataset.name]=e.value.trim()||("選手"+(+e.dataset.name+1)));render();alert("保存しました")}
$("setFirst8").onclick=()=>{s.on=s.on.map((_,i)=>i<8);selectedOut=null;render()}
$("clearOn").onclick=()=>{s.on=Array(N).fill(false);selectedOut=null;render()}
$("copy").onclick=async()=>{await navigator.clipboard.writeText($("result").value);alert("コピーしました")}
$("csv").onclick=()=>{let rows=[["No","Name","Minutes"],...s.names.map((n,i)=>[i+1,n,mins(s.sec[i])])];let csv=rows.map(r=>r.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(",")).join("\\n");let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));a.download="lifact_playtime_v3.csv";a.click()}
$("resetAll").onclick=()=>{if(confirm("すべて初期化しますか？")){localStorage.removeItem("lifact_manager_v3");location.reload()}}
</script>
</body>
</html>
